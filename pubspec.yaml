name: photobooth_app
description: "Codezy Photobooth — Android kiosk app with thermal printer support"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Printer
  print_bluetooth_thermal: ^1.0.5
  flutter_usb_printer: ^0.1.0
  esc_pos_utils_plus: ^2.0.3

  # Camera & Image
  camera: ^0.11.0+2
  image: ^4.2.0
  image_picker: ^1.1.2

  # QR Code
  qr_flutter: ^4.1.0

  # Network
  dio: ^5.7.0
  http: ^1.2.2

  # State & Navigation
  provider: ^6.1.2
  go_router: ^14.3.0

  # Storage
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Kiosk
  wakelock_plus: ^1.2.8
  flutter_fullscreen: ^1.0.1

  # Permissions
  permission_handler: ^11.3.1

  # UI
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/frames/
    - assets/qris/
    - assets/lottie/
    - assets/images/
